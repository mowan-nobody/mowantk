<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书剧集中心 - 专家版</title>
    <style>
        :root { --primary: #ff2c55; --bg: #0f1014; --card-bg: #1c1d24; --text: #ffffff; --text-gray: #8a8b91; --success: #00b42a; --warning: #ffb800; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }

        /* 通用加载动画 */
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 主页面 */
        .home-container { padding: 40px; max-width: 1400px; margin: 0 auto; }
        .input-bar { background: var(--card-bg); padding: 20px; border-radius: 12px; display: flex; gap: 15px; margin-bottom: 30px; }
        input { flex: 1; background: #2c2d36; border: 1px solid #3d3e4a; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; padding: 10px 20px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--primary); }
        .btn-pause { background: #444; }
        .btn-main:disabled { background: #333; cursor: not-allowed; }

        /* 宫格卡片 */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .ep-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; border: 2px solid transparent; transition: 0.3s; }
        .ep-card.is-active { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 44, 85, 0.3); }
        .ep-card video { width: 100%; aspect-ratio: 9/16; object-fit: cover; background: #000; }
        .ep-card-info { padding: 12px; font-size: 14px; display: flex; justify-content: space-between; }
        
        /* 状态标签 */
        .badge { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; z-index: 5; }
        .badge-wait { background: var(--warning); color: #000; }
        .badge-dl { background: var(--primary); color: #fff; }
        .badge-done { background: var(--success); color: #fff; }

        /* 底部进度条 */
        .progress-line { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--success); width: 0%; transition: width 0.1s; }

        /* --- 网页全屏播放页 --- */
        #playerPage { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        .player-wrapper { display: flex; height: 100%; width: 100%; }
        .video-side { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        #mainVideo { max-height: 100%; width: auto; max-width: 100%; outline: none; }
        
        /* 悬浮下载按钮 */
        .floating-dl-btn { position: absolute; bottom: 30px; right: 30px; background: rgba(255, 44, 85, 0.6); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .floating-dl-btn:hover { background: rgba(255, 44, 85, 1); transform: scale(1.05); }

        /* 右侧栏 */
        .info-side { width: 360px; background: var(--bg); border-left: 1px solid #2c2d36; padding: 20px; overflow-y: auto; }
        .ep-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .ep-item { 
            background: #23242d; aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-size: 14px; position: relative; overflow: hidden; border: 1px solid transparent; 
        }
        .ep-item.current { border-color: var(--primary); color: var(--primary); }
        .ep-item .bg-fill { position: absolute; bottom: 0; left: 0; width: 0%; height: 100%; background: rgba(0, 180, 42, 0.2); pointer-events: none; }
        .ep-item .status-dot { position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; border-radius: 50%; }

        .close-btn { position: absolute; top: 20px; left: 20px; z-index: 1001; cursor: pointer; background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="homePage" class="home-container">
    <div class="input-bar">
        <input type="text" id="webhookInput" placeholder="在此粘贴飞书 Webhook 链接..." />
        <button class="btn-main" id="fetchBtn" onclick="handleFetch()">提取剧集</button>
        <button class="btn-pause" id="pauseBtn" style="display:none;" onclick="togglePause()">暂停下载</button>
    </div>
    <div id="homeGrid" class="grid-layout"></div>
</div>

<div id="playerPage">
    <div class="close-btn" onclick="closePlayer()">✕</div>
    <div class="player-wrapper">
        <div class="video-side">
            <video id="mainVideo" controls></video>
            <button class="floating-dl-btn" id="dlCurrentBtn" onclick="dlCurrent()">
                📥 下载本集
            </button>
        </div>
        <div class="info-side">
            <h2 id="movieTitle">魔玩AI - TK短剧</h2>
            <div style="font-size:12px; color:var(--text-gray); margin-bottom:20px;">
                9.8k Likes · 115k Shares · EP <span id="currentEpNum">1</span>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: bold;">剧集列表</span>
                <button style="background:none; color:var(--primary); font-size:12px; padding:0" id="allDlBtn" onclick="dlAll()">下载全部</button>
            </div>
            <div id="epGrid" class="ep-grid"></div>
        </div>
    </div>
</div>

<script>
    const WEBHOOK_URL = 'https://n8n.mowanbot.com/webhook/download_feishu';
    let episodes = [];
    let currentIdx = -1;
    let globalDirHandle = null;
    let isPaused = false;
    let downloadStatus = new Map(); // index -> { progress, status: 'waiting'|'loading'|'done'|'error' }

    // --- 加载列表 ---
    async function handleFetch() {
        const input = document.getElementById('webhookInput');
        const btn = document.getElementById('fetchBtn');
        if(!input.value.trim()) return;

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> 提取中...`;

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ feishu_url: input.value.trim() })
            });
            const data = await res.json();
            const urls = data.tmp_download_url || [];
            
            episodes = urls.map((url, i) => ({
                url, idx: i, name: `EP ${(i+1).toString().padStart(2, '0')}`
            }));

            renderHomeGrid();
            renderEpGrid();
        } catch(e) { alert('提取失败'); }
        finally {
            btn.disabled = false;
            btn.innerText = "提取剧集";
        }
    }

    function renderHomeGrid() {
        const grid = document.getElementById('homeGrid');
        grid.innerHTML = episodes.map((ep, i) => `
            <div class="ep-card" id="h-card-${i}" onclick="openPlayer(${i})">
                <div id="h-badge-${i}"></div>
                <video preload="metadata"></video>
                <div class="ep-card-info">
                    <b>${ep.name}</b>
                    <span id="h-txt-${i}" style="color:var(--success); font-size:11px;"></span>
                </div>
                <div class="progress-line" id="h-bar-${i}"></div>
            </div>
        `).join('');
        syncUI();
    }

    function renderEpGrid() {
        const grid = document.getElementById('epGrid');
        grid.innerHTML = episodes.map((ep, i) => `
            <div class="ep-item ${i === currentIdx ? 'current' : ''}" id="g-item-${i}" onclick="openPlayer(${i})">
                <div class="status-dot" id="g-dot-${i}"></div>
                <div style="z-index:2">${i + 1}</div>
                <div class="bg-fill" id="g-fill-${i}"></div>
            </div>
        `).join('');
        syncUI();
    }

    // --- 播放器切换 ---
    function openPlayer(i) {
        currentIdx = i;
        const ep = episodes[i];
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('playerPage').style.display = 'block';
        document.getElementById('currentEpNum').innerText = i + 1;
        
        const v = document.getElementById('mainVideo');
        v.src = ep.url;
        v.play();
        
        renderEpGrid();
    }

    function closePlayer() {
        document.getElementById('mainVideo').pause();
        document.getElementById('playerPage').style.display = 'none';
        document.getElementById('homePage').style.display = 'block';
        renderHomeGrid();
    }

    // --- 下载核心逻辑 ---
    function togglePause() {
        isPaused = !isPaused;
        const btn = document.getElementById('pauseBtn');
        btn.innerText = isPaused ? "恢复下载" : "暂停下载";
        btn.style.background = isPaused ? "var(--success)" : "#444";
    }

    async function dlAll() {
        if(!window.showDirectoryPicker) return alert('请使用 Chrome');
        globalDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' }).catch(() => null);
        if(!globalDirHandle) return;

        document.getElementById('pauseBtn').style.display = 'flex';
        
        // 标记所有未下载的为“排队中”
        episodes.forEach((_, i) => {
            if(!downloadStatus.has(i) || downloadStatus.get(i).status === 'error') {
                downloadStatus.set(i, { progress: 0, status: 'waiting' });
            }
        });
        syncUI();

        let nextTask = 0;
        const worker = async () => {
            while(nextTask < episodes.length) {
                if(isPaused) { await new Promise(r => setTimeout(r, 1000)); continue; }
                const i = nextTask++;
                const current = downloadStatus.get(i);
                if(current && current.status === 'done') continue;
                await startDownload(i);
            }
        };
        worker(); worker(); // 2路并行
    }

    function dlCurrent() {
        startDownload(currentIdx);
    }

    async function startDownload(i) {
        const ep = episodes[i];
        downloadStatus.set(i, { progress: 0, status: 'loading' });
        syncUI();

        try {
            const res = await fetch(ep.url);
            const total = parseInt(res.headers.get('content-length'), 10);
            const reader = res.body.getReader();
            let loaded = 0;

            let writer;
            if(globalDirHandle) {
                const handle = await globalDirHandle.getFileHandle(`${ep.name}.mp4`, { create: true });
                writer = await handle.createWritable();
            }

            while(true) {
                if(isPaused && globalDirHandle) { /* 如果是全部下载模式下的暂停，fetch会继续直到块完成 */ }
                const {done, value} = await reader.read();
                if(done) break;
                if(writer) await writer.write(value);
                loaded += value.length;
                downloadStatus.set(i, { progress: (loaded / total * 100).toFixed(0), status: 'loading' });
                if(i === currentIdx || document.getElementById('homePage').style.display !== 'none') syncUI();
            }

            if(writer) await writer.close();
            downloadStatus.set(i, { progress: 100, status: 'done' });
        } catch(e) {
            downloadStatus.set(i, { progress: 0, status: 'error' });
        }
        syncUI();
    }

    // --- 界面同步 (全场同步) ---
    function syncUI() {
        const dlBtn = document.getElementById('dlCurrentBtn');
        
        downloadStatus.forEach((data, i) => {
            const p = data.progress + '%';
            
            // 1. 主页同步
            const hBar = document.getElementById(`h-bar-${i}`);
            const hTxt = document.getElementById(`h-txt-${i}`);
            const hBadge = document.getElementById(`h-badge-${i}`);
            if(hBar) {
                hBar.style.width = p;
                if(data.status === 'loading') {
                    hBadge.className = 'badge badge-dl'; hBadge.innerText = '下载中';
                    hTxt.innerText = p;
                } else if(data.status === 'waiting') {
                    hBadge.className = 'badge badge-wait'; hBadge.innerText = '排队中';
                    hTxt.innerText = '';
                } else if(data.status === 'done') {
                    hBadge.className = 'badge badge-done'; hBadge.innerText = '已完成';
                    hTxt.innerText = '✓';
                }
            }

            // 2. 选集区同步
            const gFill = document.getElementById(`g-fill-${i}`);
            const gDot = document.getElementById(`g-dot-${i}`);
            if(gFill) {
                gFill.style.width = p;
                gDot.style.background = data.status === 'done' ? 'var(--success)' : (data.status === 'loading' ? 'var(--primary)' : (data.status === 'waiting' ? 'var(--warning)' : 'transparent'));
            }

            // 3. 播放页大按钮状态 (针对当前集)
            if(i === currentIdx && dlBtn) {
                if(data.status === 'done') {
                    dlBtn.innerHTML = `✅ 已下载 (再次下载?)`;
                    dlBtn.style.background = "rgba(0, 180, 42, 0.6)";
                } else if(data.status === 'loading') {
                    dlBtn.innerHTML = `<span class="spinner"></span> 正在保存 ${p}`;
                    dlBtn.style.background = "var(--primary)";
                } else {
                    dlBtn.innerHTML = `📥 下载本集`;
                    dlBtn.style.background = "rgba(255, 44, 85, 0.6)";
                }
            }
        });
    }

    // 快捷键
    window.addEventListener('keydown', (e) => {
        const v = document.getElementById('mainVideo');
        if (document.getElementById('playerPage').style.display === 'block') {
            if (e.key === 'ArrowLeft') { e.preventDefault(); v.currentTime -= 1; }
            if (e.key === 'ArrowRight') { e.preventDefault(); v.currentTime += 1; }
        }
    });
</script>

</body>
</html>
